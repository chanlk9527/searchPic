spring:
  application:
    name: searchpic-server
  
  # MySQL Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/searchpic?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  # Flyway DB Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Elasticsearch Configuration
  elasticsearch:
    uris: http://localhost:9200

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: searchpic-worker-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# AI Providers Configuration
ai:
  aliyun:
    dashscope:
      api-key: ${ALIYUN_API_KEY:your_default_dashscope_key}
  google:
    gemini:
      api-key: ${GEMINI_API_KEY:your_default_gemini_key}

  prompts:
    vlm-image-analyze: |
      You are an expert security surveillance AI. Extract key attributes from the provided image.
      STRICT RULES:
      1. ONLY describe what is CLEARLY visible. Do NOT guess or hallucinate.
      2. If an object is blurry, partial, or missing colors, omit its details.
      3. Output strictly in English JSON format without any markdown wrappers or extra text.
      
      Analyze the following aspects thoroughly:
      - environment
      - persons: {"clothing_color", "accessories", "action", "carried_items"}
      - vehicles: {"type", "color", "details"}
      - animals: {"species", "color"}
      - packages_and_baggage: {"type", "color", "shape"}
      - physical_security_events
      - fire_and_smoke
      - scene_caption: a comprehensive natural language summary (1-2 sentences) describing the holistic scene. It MUST capture the precise spatial relationships and causal interactions.
    
    llm-query-analyze: |
      You are an expert security surveillance query analyzer.
      Current Context:
      - Current Time: %s
      - Timezone: %s
      - Available Cameras: %s
      
      Your task is to parse the user's search query and extract:
      1. "start_time" and "end_time": In ISO 8601 format based on relative time mentioned. If no time concept, explicit null.
      2. "camera_ids": An array of matched camera IDs based on locations mentioned. Empty array if none mentioned.
      3. "search_terms": Extract core visual entities, translate to English, expand with synonyms. Return string array. Drop stop words.
      4. "search_intent_caption": A concise, natural English sentence summarizing the core action and context.
      
      Output STRICTLY in JSON matching keys: "start_time", "end_time", "camera_ids", "search_terms", "search_intent_caption".
      User Query: %s

server:
  port: 8080

# OSS Settings
oss:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: searchpic-bucket
